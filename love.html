<!DOCTYPE html>
<html>
<head>
<title>The Truth 💖</title>

<style>
body {
  margin: 0;
  font-family: Figtree, sans-serif;
  text-align: center;
}

header {
  background-color: #E34A6F;
  color: white;
  padding: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-left {
  text-align: left;
}

.header-counter {
  background: #FCA311;
  padding: 10px 15px;
  border-radius: 10px;
  font-size: 14px;
}

.count-number {
  color: #000000;
  font-weight: 900;
  font-size: 22px;
  text-shadow: 0 0 5px rgba(255, 0, 80, 0.6);
}

.main {
  margin-top: 100px;
}

.big-text {
  font-size: 30px;
  color: #E34A6F;
}

.music-box {
  margin-top: 40px;
  padding: 20px;
  display: inline-block;
  background: #fff0f5;
  border: 2px solid #E34A6F;
  border-radius: 10px;
  width: 500px;
}

.music-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* 🔀 clean emoji button */
.shuffle-btn {
  background: none;
  border: none;
  font-size: 28px;
  cursor: pointer;
  padding: 5px;
  transition: transform 0.15s ease;
}
.shuffle-btn:hover {
  transform: scale(1.2);
}
.shuffle-btn:active {
  transform: scale(0.9);
}

/* ✅ double iframe system */
.player-stack {
  position: relative;
  width: 100%;
  height: 352px;
}

.player {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 12px;
  opacity: 0;
  transition: opacity 0.35s ease;
  background: #fff0f5;
}

.player.active {
  opacity: 1;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQqYVloL2KEZBpYDS2AqIW35zuZqS4bBw",
  authDomain: "best-website-f6384.firebaseapp.com",
  projectId: "best-website-f6384",
  storageBucket: "best-website-f6384.firebasestorage.app",
  messagingSenderId: "219068026223",
  appId: "1:219068026223:web:949b3a757982e24e486c9a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔢 counter
async function loadCount() {
  const ref = doc(db, "shame", "counter");
  const snap = await getDoc(ref);

  let count = 0;
  if (snap.exists()) {
    count = snap.data().value;
  }

  if (count > 0) {
    document.getElementById("counterBox").style.display = "block";
  }

  document.getElementById("counter").innerHTML =
    '🚨 MICK HATED RUNA <span class="count-number">' + count + '</span> TIMES 🚨';
}

// 🎧 playlists
const playlists = [
  "https://open.spotify.com/embed/playlist/566OyyLICNBUXSXN0URb7O?utm_source=generator",
  "https://open.spotify.com/embed/playlist/67MYiGXVGnPkTYY0t4CnJM?utm_source=generator",
  "https://open.spotify.com/embed/playlist/5dCq1zDPBA2VCaKSqsrQte?utm_source=generator",
  "https://open.spotify.com/embed/playlist/4TfbfHIKyGPZPAjxN3sliX?utm_source=generator",
  "https://open.spotify.com/embed/playlist/0WAUFDbW9H8FJARmD1TWW5?utm_source=generator"
];

let lastIndex = -1;
let showingA = true;
let isFirstLoad = true;

// 🔀 smooth shuffle
window.shufflePlaylist = function () {
  let randomIndex;

  do {
    randomIndex = Math.floor(Math.random() * playlists.length);
  } while (randomIndex === lastIndex);

  lastIndex = randomIndex;

  const playerA = document.getElementById("playerA");
  const playerB = document.getElementById("playerB");

  const nextPlayer = showingA ? playerB : playerA;
  const currentPlayer = showingA ? playerA : playerB;

  nextPlayer.src = playlists[randomIndex];

  if (isFirstLoad) {
    nextPlayer.classList.add("active");
    isFirstLoad = false;
    showingA = !showingA;
    return;
  }

  nextPlayer.classList.add("active");
  currentPlayer.classList.remove("active");

  showingA = !showingA;
};

// 🚀 load
window.onload = () => {
  loadCount();
  shufflePlaylist();
};
</script>

</head>

<body>

<header>
  <div class="header-left">
    <h1>RUNA'S FANPAGE</h1>
    <p>Only accessible to her OG 1 fan</p>
  </div>

  <div id="counterBox" class="header-counter" style="display:none;">
    <h3 id="counter">Loading shame...</h3>
  </div>
</header>

<div class="main">
  <p class="big-text">CONFIRMED. IT'S OFFICIAL. YOU'RE OBSESSED WITH ME</p>
  <p>you may celebrate accordingly</p>
</div>

<div class="music-box">
  <div class="music-header">
    <h3>What Runa is listening to:</h3>
    <button class="shuffle-btn" onclick="shufflePlaylist()">🔀</button>
  </div>

  <!-- ✅ DOUBLE PLAYER -->
  <div class="player-stack">
    <iframe id="playerA" class="player"></iframe>
    <iframe id="playerB" class="player"></iframe>
  </div>
</div>

</body>
</html>
