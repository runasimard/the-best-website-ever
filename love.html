<!DOCTYPE html>
<html>
<head>
<title>Runa Fanpage</title>

<style>
body {
  margin: 0;
  font-family: Figtree, sans-serif;
  text-align: center;
}

header {
  background-color: #E34A6F;
  color: white;
  padding: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-left {
  text-align: left;
}

.header-counter {
  background: #FCA311;
  padding: 10px 15px;
  border-radius: 10px;
  font-size: 14px;
}

.count-number {
  color: #000000;
  font-weight: 900;
  font-size: 22px;
  text-shadow: 0 0 5px rgba(255, 0, 80, 0.6);
}

.main {
  margin-top: 60px;
}

.big-text {
  font-size: 30px;
  color: #E34A6F;
  font-family: Figtree, sans-serif;
}

.content-row {
  display: flex;
  justify-content: center;
  align-items: stretch;
  gap: 30px;
  margin-top: 40px;
  flex-wrap: wrap;
}

.music-box {
  padding: 20px;
  background: #fff0f5;
  border: 2px solid #E34A6F;
  border-radius: 10px;
  width: 500px;
}
  .visit-box {
  padding: 20px;
  background: #fff0f5;
  border: 2px solid #E34A6F;
  border-radius: 10px;
  width: 350px;
     max-height: 420px;      /* adjust height if you want bigger/smaller */
  overflow-y: auto;   
}

.visit-box input {
  padding: 8px;
  border: 1px solid #E34A6F;
  border-radius: 5px;
}

.visit-box button {
  background: #E34A6F;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  margin-left: 5px;
}

.visit-box table {
  width: 100%;
  margin-top: 15px;
  border-collapse: collapse;
}
.visit-box thead th {
  position: sticky;
  top: 0;
  background: #ffe5ee;
  z-index: 1;
}
.visit-box th,
.visit-box td {
  border: 1px solid #E34A6F;
  padding: 8px;
}

.visit-box th {
  background: #ffe5ee;
}

.battle-container {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.battle-box {
  background: #fff0f5;
  border: 2px solid #E34A6F;
  border-radius: 12px;
  width: 220px;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.battle-box h2 {
  color: #E34A6F;
}

.battle-box p {
  font-size: 40px;
  font-weight: bold;
  margin: 10px 0;
}

.battle-box button {
  background: none;
  border: none;
  font-size: 38px;
  line-height: 1;
  cursor: pointer;
  transition: transform 0.15s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 5px;
  padding: 0;
}

.battle-box button:hover {
  transform: scale(1.1);
}

.battle-box button:active {
  transform: scale(0.92);
}

@keyframes pulseGlow {
  0% {
    text-shadow: 0 0 5px #ff4d88;
  }
  50% {
    text-shadow: 0 0 10px #ff4d88, 0 0 20px #ff99bb;
  }
  100% {
    text-shadow: 0 0 5px #ff4d88;
  }
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  increment,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQYVloL2KEZBpYDS2AqIW35zuZqS4bBw",
  authDomain: "best-website-f6384.firebaseapp.com",
  projectId: "best-website-f6384",
  storageBucket: "best-website-f6384.firebasestorage.app",
  messagingSenderId: "219068026223",
  appId: "1:219068026223:web:949b3a757982e24e486c9a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadCount() {
  const ref = doc(db, "shame", "counter");
  const snap = await getDoc(ref);

  let count = 0;
  if (snap.exists()) {
    count = snap.data().value;
  }

  if (count > 0) {
    document.getElementById("counterBox").style.display = "block";
  }

  document.getElementById("counter").innerHTML =
    '🚨 MICK HATED RUNA <span class="count-number">' + count + '</span> TIMES 🚨';
}

async function loadBattle() {
  const runaRef = doc(db, "battle", "runa");
  const mickRef = doc(db, "battle", "mick");

  const runaSnap = await getDoc(runaRef);
  const mickSnap = await getDoc(mickRef);

  let runaCount = 0;
  let mickCount = 0;

  if (runaSnap.exists()) {
    runaCount = runaSnap.data().value;
  }

  if (mickSnap.exists()) {
    mickCount = mickSnap.data().value;
  }

  document.getElementById("runaCount").innerText = runaCount;
  document.getElementById("mickCount").innerText = mickCount;
}

window.addPoint = async function(person) {
  const ref = doc(db, "battle", person);

  const snap = await getDoc(ref);

  if (!snap.exists()) {
    await setDoc(ref, { value: 1 });
  } else {
    await updateDoc(ref, { value: increment(1) });
  }

  loadBattle();
};
 async function loadDates() {
  const snapshot = await getDocs(collection(db, "visitDates"));

  const body = document.getElementById("datesBody");
  if (!body) return;

  body.innerHTML = "";

  const dates = [];

  snapshot.forEach((docSnap) => {
    dates.push(docSnap.data().date);
  });

  // newest first
  dates.reverse();

  dates.forEach((date) => {
    const row = document.createElement("tr");
    row.innerHTML = `<td>${date}</td>`;
    body.appendChild(row);
  });
}

window.addDate = async function() {
  const input = document.getElementById("visitDate");

  if (!input.value) {
    alert("Pick a date first!");
    return;
  }

  await addDoc(collection(db, "visitDates"), {
    date: input.value
  });

  input.value = "";

  loadDates();
};

window.onload = () => {
  loadCount();
  loadBattle();
  loadDates();
};
</script>

</head>

<body>

<header>
  <div class="header-left">
    <h1>RUNA'S FANPAGE</h1>
    <p>Only accessible to her OG 1 fan</p>
  </div>

  <div id="counterBox" class="header-counter" style="display:none;">
    <h3 id="counter">Loading shame...</h3>
  </div>
</header>

<div class="main">
  <p class="big-text">CONFIRMED. IT'S OFFICIAL YOU'RE OBSESSED WITH ME</p>
</div>

<div class="content-row">

  <div class="music-box">
    <h3>What Runa is listening to:</h3>
    <iframe
      data-testid="embed-iframe"
      style="border-radius:12px"
      src="https://open.spotify.com/embed/album/3IKW2jLFBTUGEIwJha62vD?utm_source=generator"
      width="100%"
      height="352"
      frameBorder="0"
      allowfullscreen
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy">
    </iframe>
  </div>
 <div class="visit-box">
  <h3>Share some date ideas:</h3>

  <input type="text" id="visitDate" placeholder="Type a date idea">
  <button onclick="addDate()">Add</button>

  <table>
    <thead>
      <tr>
        <th>Dates</th>
      </tr>
    </thead>
    <tbody id="datesBody"></tbody>
  </table>
</div>

  <div class="battle-container">

    <div class="battle-box">
      <h2>Runa Kisses</h2>
      <p id="runaCount">0</p>
      <button onclick="addPoint('runa')">💋</button>
    </div>

    <div class="battle-box">
      <h2>Mick Kisses</h2>
      <p id="mickCount">0</p>
      <button onclick="addPoint('mick')">💋</button>
    </div>


  </div>

</div>

</body>
</html>
