<!DOCTYPE html>
<html>
<head>
<title>Runa Fanpage</title>

<style>
body {
  margin: 0;
  font-family: Figtree, sans-serif;
  text-align: center;
}

/* HEADER */
header {
  background-color: #E34A6F;
  color: white;
  padding: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-left {
  text-align: left;
}

.header-counter {
  background: #FCA311;
  padding: 10px 15px;
  border-radius: 10px;
  font-size: 14px;
}

.count-number {
  color: #000;
  font-weight: 900;
  font-size: 22px;
}

/* MAIN */
.main {
  margin-top: 100px;
}

.big-text {
  font-size: 30px;
  color: #E34A6F;
}

/* CONTENT LAYOUT */
.content-row {
  display: flex;
  justify-content: center;
  align-items: stretch;
  gap: 30px;
  margin-top: 40px;
  flex-wrap: wrap;
}

/* MUSIC */
.music-box {
  padding: 20px;
  background: #fff0f5;
  border: 2px solid #E34A6F;
  border-radius: 10px;
  width: 500px;
}

/* BATTLE SIDE */
.battle-container {
  display: flex;
  flex-direction: column;
  justify-content: space-between; /* KEY FIX */
  height: 100%; /* KEY FIX */
  gap: 20px;
}

/* BOX */
.battle-box {
  background: #fff0f5;
  border: 2px solid #E34A6F;
  border-radius: 12px;
  width: 220px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  padding: 20px 0;
  gap: 10px;
}

/* TEXT */
.battle-box h2 {
  margin: 0;
  color: #E34A6F;
}

.battle-box p {
  margin: 0;
  font-size: 40px;
  font-weight: bold;
  color: #E34A6F;
}

/* BUTTON */
.battle-box button {
  background: none;
  border: none;
  font-size: 38px;
  cursor: pointer;
  transition: transform 0.15s ease;
  line-height: 1;
}

.battle-box button:hover {
  transform: scale(1.1);
}

.battle-box button:active {
  transform: scale(0.92);
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQY...",
  authDomain: "best-website-f6384.firebaseapp.com",
  projectId: "best-website-f6384",
  storageBucket: "best-website-f6384.firebasestorage.app",
  messagingSenderId: "219068026223",
  appId: "1:219068026223:web:949b3a757982e24e486c9a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadBattle() {
  const runaSnap = await getDoc(doc(db, "battle", "runa"));
  const mickSnap = await getDoc(doc(db, "battle", "mick"));

  let runa = runaSnap.exists() ? runaSnap.data().value : 0;
  let mick = mickSnap.exists() ? mickSnap.data().value : 0;

  document.getElementById("runaCount").innerText = runa;
  document.getElementById("mickCount").innerText = mick;
}

window.addPoint = async function(person) {
  const ref = doc(db, "battle", person);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    await setDoc(ref, { value: 1 });
  } else {
    await updateDoc(ref, { value: increment(1) });
  }

  loadBattle();
};

window.onload = () => {
  loadBattle();
};
</script>

</head>

<body>

<header>
  <div class="header-left">
    <h1>RUNA'S FANPAGE</h1>
    <p>Only accessible to her OG 1 fan</p>
  </div>
</header>

<div class="main">
  <p class="big-text">CONFIRMED. IT'S OFFICIAL. YOU'RE OBSESSED WITH ME</p>
</div>

<div class="content-row">

  <div class="music-box">
    <h3>What Runa is listening to:</h3>
    <iframe
      style="border-radius:12px"
      src="https://open.spotify.com/embed/playlist/566OyyLICNBUXSXN0URb7O"
      width="100%" height="352">
    </iframe>
  </div>

  <div class="battle-container">

    <div class="battle-box">
      <h2>Runa Kisses</h2>
      <p id="runaCount">0</p>
      <button onclick="addPoint('runa')">💋</button>
    </div>

    <div class="battle-box">
      <h2>Mick Kisses</h2>
      <p id="mickCount">0</p>
      <button onclick="addPoint('mick')">💋</button>
    </div>

  </div>

</div>

</body>
</html>
