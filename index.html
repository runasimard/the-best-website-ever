<!DOCTYPE html>
<html>
<head>
<title>Runa's Legendary Site</title>

<style>
  body {
    margin: 0;
    font-family: Figtree, sans-serif;
    text-align: center;
  }

  header {
    background-color: #E34A6F;
    color: white;
    padding: 30px;
  }

  .box {
    margin: 50px auto;
    padding: 20px;
    width: 300px;
    border: 2px solid #E34A6F;
    border-radius: 10px;
    background-color: #fff0f5;
  }

  button {
    margin: 10px;
    padding: 10px 15px;
    border: none;
    background-color: #E34A6F;
    color: white;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover {
    background-color: #c63c5d;
  }

  /* Popup background */
  .popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
  }

  /* Popup box */
  .popup-content {
    background: white;
    padding: 20px;
    margin: 15% auto;
    width: 300px;
    border-radius: 10px;
  }

</style>

<script>
  function showPopup() {
    document.getElementById("popup").style.display = "block";
  }

  function answer(choice) {
    if (choice === "YES") {
      alert("I knew it 😄❤️");
    } 
    else if (choice === "yes") {
      alert("ok so no enthusiasm 😐");
    } 
    else if (choice === "no") {
      alert("Wow okay 😭");
      window.close(); // might not work unless tab was opened by script
    }
  }
</script>

</head>

<body>

<header>
  <h1>Runa's Legendary Site</h1>
  <p>Welcome to my awesome website!</p>
</header>

<div class="box">
  <h2>Human Verification needed</h2>
  <button onclick="showPopup()">OK</button>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h3>Do you love me?</h3>
    <button onclick="answer('YES')">YES</button>
    <button onclick="answer('yes')">yes</button>
    <button onclick="answer('no')">no</button>
  </div>
</div>

</body>
</html>
