<!DOCTYPE html>
<html>
<head>
<title>Runa's Legendary Site</title>

<style>
  body {
    margin: 0;
    font-family: Figtree, sans-serif;
    text-align: center;
  }

  
header {
  background-color: #E34A6F;
  color: white;
  padding: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-left {
  text-align: left;
}

.header-counter {
  background: #FCA311;
  padding: 10px 15px;
  border-radius: 10px;
  font-size: 14px;
}


  .box {
    margin: 50px auto;
    padding: 20px;
    width: 450px;
    border: 2px solid #E34A6F;
    border-radius: 10px;
    background-color: #fff0f5;
  }

  button {
    margin: 10px;
    padding: 10px 15px;
    border: none;
    background-color: #E34A6F;
    color: white;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover {
    background-color: #c63c5d;
  }

  
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}



.popup-content {
  background: white;
  padding: 20px;
  margin: 15% auto;
  width: 300px;
  border-radius: 10px;
  animation: popIn 0.3s ease;
}

@keyframes popIn {
  from {
    transform: scale(0.8);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}



.count-number {
  color: #000000;
  font-weight: 900;
  font-size: 22px;
  text-shadow: 0 0 5px rgba(255, 0, 80, 0.6);
}



</style>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Close popup when clicking outside

window.addEventListener("click", function (event) {
  const popup1 = document.getElementById("popup");
  const popup2 = document.getElementById("popup2");

  if (event.target === popup1) popup1.style.display = "none";
  if (event.target === popup2) popup2.style.display = "none";
});


const firebaseConfig = {
  apiKey: "AIzaSyDQqYVloL2KEZBpYDS2AqIW35zuZqS4bBw",
  authDomain: "best-website-f6384.firebaseapp.com",
  projectId: "best-website-f6384",
  storageBucket: "best-website-f6384.firebasestorage.app",
  messagingSenderId: "219068026223",
  appId: "1:219068026223:web:949b3a757982e24e486c9a",
  measurementId: "G-E79CGXSEP1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let count = 0;


async function loadCount() {
  const ref = doc(db, "shame", "counter");
  const snap = await getDoc(ref);

  if (snap.exists()) {
    count = snap.data().value;
  } else {
    count = 0;
    await setDoc(ref, { value: 0 });
  }

  if (count > 0) {
    document.getElementById("counterBox").style.display = "block";
  }

  document.getElementById("counter").innerHTML =
    '🚨 MICK HATED RUNA <span class="count-number">' + count + '</span> TIMES 🚨';
}

// When he confirms ultimate love

window.trueLove = function () {
  window.location.href = "love.html";
};


// EVIL BUTTON THAT RUNS AWAY
window.moveButton = function () {
  const btn = document.getElementById("escapeBtn");

  const x = Math.random() * 200 - 100;
  const y = Math.random() * 200 - 100;

  btn.style.transform = `translate(${x}px, ${y}px)`;
};

window.onload = loadCount;

window.showPopup = function () {
  document.getElementById("popup").style.display = "block";
  document.getElementById("question").innerHTML = "Do you love me?";
};

window.answer = async function (choice) {
  const text = document.getElementById("question");

  
if (choice === "YES") {
  document.getElementById("popup").style.display = "none";
  document.getElementById("popup2").style.display = "block";
}

  
else if (choice === "yes" || choice === "no") {

  if (choice === "yes") {
    text.innerHTML = "ok so u hate me no enthusiasm 😐";
  } 
  else {
    text.innerHTML = "now why would you pick that... shame on you";
  }
  count++;

const ref = doc(db, "shame", "counter");
  await setDoc(ref, { value: count });

  document.getElementById("counterBox").style.display = "block";

  document.getElementById("counter").innerHTML =
    '🚨 MICK HATED RUNA <span class="count-number">' + count + '</span> TIMES 🚨';
}


};

</script>

</head>

<body>


<header>
  <div class="header-left">
    <h1>RUNA'S LEGENDARY SITE</h1>
    <p>Welcome to my VERY wholesome website!</p>
  </div>

  <div id="counterBox" class="header-counter" style="display:none;">
    <h3 id="counter">Loading shame...</h3>
  </div>
</header>


<div class="box">
  <h2>Human Verification needed</h2>
  <button onclick="showPopup()">PROCEED</button>
</div>



<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h3 id="question">Do you love me?</h3>
    <button onclick="answer('YES')">YEEEEES</button>
    <button onclick="answer('yes')">yes</button>
    <button onclick="answer('no')">no.</button>
  </div>
</div>

<div id="popup2" class="popup">
  <div class="popup-content">
    <h3>Do YOU tho?</h3>

    <button onclick="trueLove()">YES YOURE THE LOVE OF MY LIFE</button>

    <button id="escapeBtn" 
      onmouseover="moveButton()" 
      style="position: relative;">
      no
    </button>

  </div>
</div>

</body>
</html>
