<!DOCTYPE html>
<html>
<head>
<title>Runa's Legendary Site</title>

<style>
  body {
    margin: 0;
    font-family: Figtree, sans-serif;
    text-align: center;
  }

  
header {
  background-color: #E34A6F;
  color: white;
  padding: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-left {
  text-align: left;
}

.header-counter {
  background: rgba(255,255,255,0.2);
  padding: 10px 15px;
  border-radius: 10px;
  font-size: 14px;
}


  .box {
    margin: 50px auto;
    padding: 20px;
    width: 450px;
    border: 2px solid #E34A6F;
    border-radius: 10px;
    background-color: #fff0f5;
  }

  button {
    margin: 10px;
    padding: 10px 15px;
    border: none;
    background-color: #E34A6F;
    color: white;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover {
    background-color: #c63c5d;
  }

  .popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
  }

  .popup-content {
    background: white;
    padding: 20px;
    margin: 15% auto;
    width: 300px;
    border-radius: 10px;
  }
</style>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Close popup when clicking outside
window.addEventListener("click", function (event) {
  const popup = document.getElementById("popup");

  if (event.target === popup) {
    popup.style.display = "none";
  }
});

const firebaseConfig = {
  apiKey: "AIzaSyDQqYVloL2KEZBpYDS2AqIW35zuZqS4bBw",
  authDomain: "best-website-f6384.firebaseapp.com",
  projectId: "best-website-f6384",
  storageBucket: "best-website-f6384.firebasestorage.app",
  messagingSenderId: "219068026223",
  appId: "1:219068026223:web:949b3a757982e24e486c9a",
  measurementId: "G-E79CGXSEP1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let count = 0;

// ✅ FIXED FUNCTION
async function loadCount() {
  const ref = doc(db, "shame", "counter");
  const snap = await getDoc(ref);

  if (snap.exists()) {
    count = snap.data().value;
  } else {
    count = 0;
    await setDoc(ref, { value: 0 });
  }

  // ✅ FIXED ">" symbol + brackets
  if (count > 0) {
    document.getElementById("counterBox").style.display = "block";
  }

  document.getElementById("counter").innerText =
    "Mick hated Runa " + count + " times";
}

window.onload = loadCount;

window.showPopup = function () {
  document.getElementById("popup").style.display = "block";
  document.getElementById("question").innerHTML = "Do you love me?";
};

window.answer = async function (choice) {
  const text = document.getElementById("question");

  if (choice === "YES") {
    text.innerHTML = "i knew it 😄❤️";
  } 
  else if (choice === "yes") {
    text.innerHTML = "ok so u hate me no enthusiasm 😐";
  } 
  else if (choice === "no") {
    text.innerHTML = "now why would you pick that... shame on you";

    count++;

    const ref = doc(db, "shame", "counter");
    await setDoc(ref, { value: count });

    // ✅ reveal counter
    document.getElementById("counterBox").style.display = "block";

    document.getElementById("counter").innerText =
      "Mick hated Runa " + count + " times";
  }
};

</script>

</head>

<body>


<header>
  <div class="header-left">
    <h1>Runa's Legendary Site</h1>
    <p>Welcome to my VERY wholesome website!</p>
  </div>

  <div id="counterBox" class="header-counter" style="display:none;">
    <h3 id="counter">Loading shame...</h3>
  </div>
</header>


<div class="box">
  <h2>Human Verification needed</h2>
  <button onclick="showPopup()">PROCEED</button>
</div>



<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h3 id="question">Do you love me?</h3>
    <button onclick="answer('YES')">YEEEEES</button>
    <button onclick="answer('yes')">yes</button>
    <button onclick="answer('no')">no.</button>
  </div>
</div>

</body>
</html>
